name: Update Catalogs

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * *"

permissions:
  contents: write

concurrency:
  group: update-catalogs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUTF8: "1"
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install scraper
        run: python -m pip install .

      - name: Validate TMDB credentials
        run: |
          if [ -z "${TMDB_API_KEY}" ] && [ -z "${TMDB_ACCESS_TOKEN}" ]; then
            echo "TMDB_API_KEY or TMDB_ACCESS_TOKEN must be configured as a repository or environment secret."
            exit 1
          fi

      - name: Update catalogs
        run: python scripts/update_catalogs.py

      - name: Commit and push catalog updates
        run: |
          if [ -z "$(git status --porcelain -- catalogs)" ]; then
            echo "No catalog changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalogs
          git commit -m "chore: update FP catalogs"
          git push
